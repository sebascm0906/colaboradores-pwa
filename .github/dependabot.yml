# Dependabot — colaboradores-pwa
# Cadencia semanal para npm + GitHub Actions.
# Cuando GitHub agrupe un PR de upgrade, los reviewers de CODEOWNERS quedan
# asignados automáticamente (capa API/auth/config sigue cubierta).
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
